openapi: 3.0.0
info:
  title: Floor Control API
  description: API for managing floor ownership in a push-to-talk radio group system.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /groups/{groupId}/floor:
    post:
      summary: Obtain the floor
      description: Allows a user to obtain the floor for a radio group. A higher-priority request can take over the floor from the current holder.
      operationId: obtainFloor
      tags:
        - Floor Control
      parameters:
        - name: groupId
          in: path
          required: true
          description: Radio group identifier.
          schema:
            type: string
            example: group-alpha
      requestBody:
        required: true
        description: User requesting the floor.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "200":
          description: Floor obtained.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Floor obtained by radio-1 for group group-alpha
        "400":
          description: Missing or invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "Invalid request: priority must be an integer"
        "409":
          description: Floor is held by another user with equal or higher priority.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: Floor is currently held by radio-1 for group group-alpha with priority 5
    get:
      summary: Get the current floor holder
      description: Returns the current user holding the floor for a radio group.
      operationId: getCurrentFloorHolder
      tags:
        - Floor Control
      parameters:
        - name: groupId
          in: path
          required: true
          description: Radio group identifier.
          schema:
            type: string
            example: group-alpha
      responses:
        "200":
          description: Current floor holder.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HolderResponse"
              example:
                userId: radio-1
                priority: 5
        "204":
          description: No user currently holds the floor.
  /groups/{groupId}/floor/{userId}:
    delete:
      summary: Release the floor
      description: Allows the current holder to release the floor for a radio group.
      operationId: releaseFloor
      tags:
        - Floor Control
      parameters:
        - name: groupId
          in: path
          required: true
          description: Radio group identifier.
          schema:
            type: string
            example: group-alpha
        - name: userId
          in: path
          required: true
          description: User releasing the floor.
          schema:
            type: string
            example: radio-1
      responses:
        "200":
          description: Floor released.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
              example:
                message: Floor released by radio-1 for group group-alpha
        "403":
          description: User does not hold the floor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: User radio-2 does not hold the floor for group group-alpha
components:
  schemas:
    UserRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          description: User requesting the floor.
          example: radio-1
        priority:
          type: integer
          description: Request priority. Higher values can take over the floor from lower-priority holders.
          default: 0
          example: 3
    HolderResponse:
      type: object
      required:
        - userId
        - priority
      properties:
        userId:
          type: string
          description: Current floor holder.
          example: radio-1
        priority:
          type: integer
          description: Current holder priority.
          example: 5
    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
