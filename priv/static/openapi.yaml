openapi: 3.0.0
info:
  title: Radio Group Call Management API
  description: >
    REST API for managing floor control in a push-to-talk radio group system.
    The service supports time-limited floor ownership, priority-based takeover,
    current holder lookup, and audit history.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /health:
    get:
      summary: Health check
      tags:
        - Operations
      responses:
        "200":
          description: Service is running.
  /groups/{groupId}/floor:
    post:
      summary: Obtain the floor
      description: >
        Grants the floor to a user when it is free, when the same user renews
        it, or when the request priority is higher than the current holder's
        priority.
      operationId: obtainFloor
      tags:
        - Floor Control
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObtainFloorRequest"
      responses:
        "200":
          description: Floor was obtained.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "409":
          description: Floor is held by another user with equal or higher priority.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
    get:
      summary: Retrieve the current floor holder
      operationId: retrieveFloorHolder
      tags:
        - Floor Control
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Floor holder was found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FloorHolder"
        "204":
          description: No user currently holds the floor.
  /groups/{groupId}/floor/{userId}:
    delete:
      summary: Release the floor
      operationId: releaseFloor
      tags:
        - Floor Control
      parameters:
        - $ref: "#/components/parameters/GroupId"
        - name: userId
          in: path
          required: true
          schema:
            type: string
          example: user-456
      responses:
        "200":
          description: Floor was released.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: The user does not hold the floor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /audit/floor:
    get:
      summary: Retrieve floor audit history
      operationId: retrieveFloorAudit
      tags:
        - Floor Control
      parameters:
        - name: count
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: Recent audit events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"
        "400":
          description: Invalid count parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
components:
  parameters:
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
      example: group-alpha-123
  schemas:
    ObtainFloorRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          example: user-456
        priority:
          type: integer
          default: 0
          description: Higher numbers can preempt lower-priority holders.
          example: 5
    FloorHolder:
      type: object
      properties:
        userId:
          type: string
          example: user-456
        priority:
          type: integer
          example: 5
    AuditEvent:
      type: object
      properties:
        action:
          type: string
          enum:
            - obtain
            - release
        groupId:
          type: string
        userId:
          type: string
        priority:
          type: integer
        reason:
          type: string
          enum:
            - granted
            - renewed
            - preempted
            - manual
            - timeout
        timestamp:
          type: string
          format: date-time
    MessageResponse:
      type: object
      properties:
        message:
          type: string
