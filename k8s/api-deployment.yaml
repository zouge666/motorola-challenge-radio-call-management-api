apiVersion: apps/v1
kind: Deployment
metadata:
  name: radio-call-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radio-call-api
  template:
    metadata:
      labels:
        app: radio-call-api
    spec:
      containers:
        - name: api
          image: radio_call_api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: FLOOR_LEASE_MS
              value: "60000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
